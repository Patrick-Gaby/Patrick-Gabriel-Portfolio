<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script/transitions.js" defer></script>
    <script type="module" src="script/components/loadIcons.js"></script>
    <link rel="stylesheet" href="style/main.css" />
    <link rel="icon" href="assets/icons/terminal.svg" />
    <title>Portfolio</title>
  </head>
  <body>
    <!-- Navigation -->
    <nav>
      <!-- Page Links -->
      <div id="sideNavigationContentWrapper">
        <div class="horizontalLine" style="height: 25px; width: 50rem; background-color: rgb(133, 110, 163); box-shadow: 0px 0px 60px 0px rgb(188, 130, 255); transform: translateY(-2.5rem) translateX(-16.5rem)"></div>
        <!-- Nav Logo -->
        <div class="navLogo">
          <span class="prompt">&gt;</span>
          <span class="name">Patrick_</span>
        </div>

        <div class="linkContainer">
          <a class="navLinks" href=""
            ><div class="navIcon" data-icon="terminal"></div>
            Projects</a
          >
          <a class="navLinks" href=""
            ><div class="navIcon" data-icon="memory"></div>
            Skills</a
          >
          <a class="navLinks" href=""
            ><div class="navIcon" data-icon="description"></div>
            Resume</a
          >
          <a class="navLinks" href=""
            ><div class="navIcon" data-icon="account"></div>
            Contact</a
          >
        </div>

        <div class="navFooter">
          <!-- Dark Mode Toggle -->
          <div id="darkModeWrapper">
            <div id="darkModeContainer">
              <p id="lightText">Dark Mode</p>

              <input type="checkbox" id="themeToggle" onchange="toggleDarkmode()" />

              <label id="switchBox" for="themeToggle">
                <div id="toggleIcon"></div>
              </label>
            </div>
          </div>

          <!-- Connect Links -->
          <div class="connectWrapper">
            <div class="connectLinks">
              <a href="" class="linkButtons"><div class="navIcon" data-icon="discord"></div></a>
              <a href="" class="linkButtons"><div class="navIcon" data-icon="linkedin"></div></a>
              <a href="" class="linkButtons"><div class="navIcon" data-icon="github"></div></a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Toggle Bar -->
    <div class="toggleBarContainer" onclick="toggleBar(this)">
      <div class="toggleBar">
        <div id="bar1"></div>
        <div id="bar2"></div>
        <div id="bar3"></div>
      </div>
      <div class="toggleBarBorder"></div>
    </div>

    <!-- Content Wrapper -->
    <div id="contentContainerWrapper">
      <div class="contentContainer">
        <!--Contents-->
      </div>
    </div>
  </body>
</html>
